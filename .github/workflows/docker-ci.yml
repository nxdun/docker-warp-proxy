name: docker-ci

permissions:
  contents: read
  packages: write

on:
  release:
    types: [published]
  push:
    branches:
      - main
      - nadun/fail-fast-option

jobs:
  run-docker-build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6.0.2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      -
        name: Login to DockerHub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}
      -
        name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ github.actor }}/cloudflare-warp-proxy:${{ contains(github.ref_name, 'beta') && 'beta' || 'latest' }}
