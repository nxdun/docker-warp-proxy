services:
  cloudflare-warp-proxy:
    image: seiry/cloudflare-warp-proxy
    # image: ghcr.io/seiry/cloudflare-warp-proxy
    network_mode: bridge
    ports:
      - 40000:40000
    restart: unless-stopped
    environment:
      # - LICENSE=you-own-key
      - PROTOCOL=WireGuard
      # - PROTOCOL=MASQUE # MASQUE or WireGuard for tunnel protocol
    logging:
      driver: json-file
      options:
        max-size: 1m
